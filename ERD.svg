<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="620" fill="#f8fafc" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">ERD - Keripik Pangsit System</text>

  <!-- ====== TABLE: customers ====== -->
  <g transform="translate(30, 70)">
    <rect width="200" height="200" rx="8" fill="#fff" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
    <rect width="200" height="36" rx="8" fill="#6366f1"/>
    <rect y="28" width="200" height="8" fill="#6366f1"/>
    <text x="100" y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="white">customers</text>
    <!-- columns -->
    <line x1="0" y1="36" x2="200" y2="36" stroke="#e2e8f0"/>
    <text x="10" y="56" font-size="11" fill="#7c3aed" font-weight="bold">🔑 id</text>
    <text x="100" y="56" font-size="10" fill="#64748b">VARCHAR(36) PK</text>
    <line x1="0" y1="64" x2="200" y2="64" stroke="#f1f5f9"/>
    <text x="10" y="82" font-size="11" fill="#374151">nama_customer</text>
    <text x="120" y="82" font-size="10" fill="#64748b">VARCHAR(100)</text>
    <line x1="0" y1="90" x2="200" y2="90" stroke="#f1f5f9"/>
    <text x="10" y="108" font-size="11" fill="#374151">poin</text>
    <text x="120" y="108" font-size="10" fill="#64748b">INTEGER</text>
    <line x1="0" y1="116" x2="200" y2="116" stroke="#f1f5f9"/>
    <text x="10" y="134" font-size="11" fill="#374151">tanggal_daftar</text>
    <text x="120" y="134" font-size="10" fill="#64748b">TIMESTAMP</text>
  </g>

  <!-- ====== TABLE: products ====== -->
  <g transform="translate(620, 70)">
    <rect width="240" height="240" rx="8" fill="#fff" stroke="#10b981" stroke-width="2"/>
    <rect width="240" height="36" rx="8" fill="#10b981"/>
    <rect y="28" width="240" height="8" fill="#10b981"/>
    <text x="120" y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="white">products</text>
    <line x1="0" y1="36" x2="240" y2="36" stroke="#e2e8f0"/>
    <text x="10" y="56" font-size="11" fill="#7c3aed" font-weight="bold">🔑 id</text>
    <text x="110" y="56" font-size="10" fill="#64748b">VARCHAR(36) PK</text>
    <line x1="0" y1="64" x2="240" y2="64" stroke="#f1f5f9"/>
    <text x="10" y="82" font-size="11" fill="#374151">nama_produk</text>
    <text x="120" y="82" font-size="10" fill="#64748b">VARCHAR(100)</text>
    <line x1="0" y1="90" x2="240" y2="90" stroke="#f1f5f9"/>
    <text x="10" y="108" font-size="11" fill="#374151">tipe_produk</text>
    <text x="120" y="108" font-size="10" fill="#64748b">VARCHAR(100)</text>
    <line x1="0" y1="116" x2="240" y2="116" stroke="#f1f5f9"/>
    <text x="10" y="134" font-size="11" fill="#374151">rasa</text>
    <text x="120" y="134" font-size="10" fill="#64748b">VARCHAR(50)</text>
    <line x1="0" y1="142" x2="240" y2="142" stroke="#f1f5f9"/>
    <text x="10" y="160" font-size="11" fill="#374151">ukuran</text>
    <text x="120" y="160" font-size="10" fill="#64748b">VARCHAR(20)</text>
    <line x1="0" y1="168" x2="240" y2="168" stroke="#f1f5f9"/>
    <text x="10" y="186" font-size="11" fill="#374151">harga</text>
    <text x="120" y="186" font-size="10" fill="#64748b">NUMERIC(12,2)</text>
    <line x1="0" y1="194" x2="240" y2="194" stroke="#f1f5f9"/>
    <text x="10" y="212" font-size="11" fill="#374151">stok / tanggal_buat</text>
    <text x="160" y="212" font-size="10" fill="#64748b">INT / DATE</text>
  </g>

  <!-- ====== TABLE: transactions ====== -->
  <g transform="translate(280, 70)">
    <rect width="280" height="340" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
    <rect width="280" height="36" rx="8" fill="#f59e0b"/>
    <rect y="28" width="280" height="8" fill="#f59e0b"/>
    <text x="140" y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="white">transactions</text>
    <line x1="0" y1="36" x2="280" y2="36" stroke="#e2e8f0"/>
    <text x="10" y="56" font-size="11" fill="#7c3aed" font-weight="bold">🔑 id</text>
    <text x="140" y="56" font-size="10" fill="#64748b">VARCHAR(36) PK</text>
    <line x1="0" y1="64" x2="280" y2="64" stroke="#f1f5f9"/>
    <text x="10" y="82" font-size="11" fill="#dc2626" font-weight="bold">🔗 customer_id</text>
    <text x="140" y="82" font-size="10" fill="#64748b">VARCHAR(36) FK</text>
    <line x1="0" y1="90" x2="280" y2="90" stroke="#f1f5f9"/>
    <text x="10" y="108" font-size="11" fill="#374151">nama_customer</text>
    <text x="150" y="108" font-size="10" fill="#64748b">VARCHAR(100)</text>
    <line x1="0" y1="116" x2="280" y2="116" stroke="#f1f5f9"/>
    <text x="10" y="134" font-size="11" fill="#dc2626" font-weight="bold">🔗 product_id</text>
    <text x="140" y="134" font-size="10" fill="#64748b">VARCHAR(36) FK</text>
    <line x1="0" y1="142" x2="280" y2="142" stroke="#f1f5f9"/>
    <text x="10" y="160" font-size="11" fill="#374151">nama_produk</text>
    <text x="150" y="160" font-size="10" fill="#64748b">VARCHAR(100)</text>
    <line x1="0" y1="168" x2="280" y2="168" stroke="#f1f5f9"/>
    <text x="10" y="186" font-size="11" fill="#374151">ukuran_produk / rasa</text>
    <text x="170" y="186" font-size="10" fill="#64748b">VARCHAR</text>
    <line x1="0" y1="194" x2="280" y2="194" stroke="#f1f5f9"/>
    <text x="10" y="212" font-size="11" fill="#374151">quantity / harga</text>
    <text x="170" y="212" font-size="10" fill="#64748b">INT / NUMERIC</text>
    <line x1="0" y1="220" x2="280" y2="220" stroke="#f1f5f9"/>
    <text x="10" y="238" font-size="11" fill="#374151">total_harga</text>
    <text x="150" y="238" font-size="10" fill="#64748b">NUMERIC(12,2)</text>
    <line x1="0" y1="246" x2="280" y2="246" stroke="#f1f5f9"/>
    <text x="10" y="264" font-size="11" fill="#374151">tanggal_transaksi</text>
    <text x="160" y="264" font-size="10" fill="#64748b">TIMESTAMP</text>
    <line x1="0" y1="272" x2="280" y2="272" stroke="#f1f5f9"/>
    <text x="10" y="290" font-size="11" fill="#374151">is_customer_baru</text>
    <text x="160" y="290" font-size="10" fill="#64748b">BOOLEAN</text>
  </g>

  <!-- ====== TABLE: redeem_logs ====== -->
  <g transform="translate(280, 440)">
    <rect width="280" height="170" rx="8" fill="#fff" stroke="#ef4444" stroke-width="2"/>
    <rect width="280" height="36" rx="8" fill="#ef4444"/>
    <rect y="28" width="280" height="8" fill="#ef4444"/>
    <text x="140" y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="white">redeem_logs</text>
    <line x1="0" y1="36" x2="280" y2="36" stroke="#e2e8f0"/>
    <text x="10" y="56" font-size="11" fill="#7c3aed" font-weight="bold">🔑 id</text>
    <text x="140" y="56" font-size="10" fill="#64748b">VARCHAR(36) PK</text>
    <line x1="0" y1="64" x2="280" y2="64" stroke="#f1f5f9"/>
    <text x="10" y="82" font-size="11" fill="#dc2626" font-weight="bold">🔗 customer_id</text>
    <text x="140" y="82" font-size="10" fill="#64748b">VARCHAR(36) FK</text>
    <line x1="0" y1="90" x2="280" y2="90" stroke="#f1f5f9"/>
    <text x="10" y="108" font-size="11" fill="#dc2626" font-weight="bold">🔗 product_id</text>
    <text x="140" y="108" font-size="10" fill="#64748b">VARCHAR(36) FK</text>
    <line x1="0" y1="116" x2="280" y2="116" stroke="#f1f5f9"/>
    <text x="10" y="134" font-size="11" fill="#374151">nama_customer / nama_produk</text>
    <text x="10" y="150" font-size="11" fill="#374151">ukuran_produk / poin_digunakan / tanggal_redeem</text>
  </g>

  <!-- ====== RELATIONSHIPS ====== -->
  <!-- customers → transactions (customer_id) -->
  <line x1="230" y1="148" x2="280" y2="148" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="242" y="143" font-size="9" fill="#6366f1">1:N</text>
  
  <!-- products → transactions (product_id) -->
  <line x1="560" y1="200" x2="620" y2="200" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="566" y="195" font-size="9" fill="#10b981">N:1</text>

  <!-- customers → redeem_logs -->
  <line x1="130" y1="270" x2="130" y2="540" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="130" y1="540" x2="280" y2="510" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="90" y="420" font-size="9" fill="#6366f1">1:N</text>

  <!-- products → redeem_logs -->
  <line x1="740" y1="310" x2="740" y2="540" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="740" y1="540" x2="560" y2="510" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="748" y="420" font-size="9" fill="#10b981">1:N</text>

  <!-- Legend -->
  <g transform="translate(30, 560)">
    <text x="0" y="0" font-size="11" fill="#374151" font-weight="bold">Legend:</text>
    <line x1="60" y1="-4" x2="100" y2="-4" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="105" y="0" font-size="10" fill="#374151">Relationship (FK)</text>
    <text x="230" y="0" font-size="10" fill="#7c3aed">🔑 = Primary Key</text>
    <text x="370" y="0" font-size="10" fill="#dc2626">🔗 = Foreign Key</text>
  </g>

  <!-- Poin rule note -->
  <g transform="translate(30, 420)">
    <rect width="220" height="100" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="10" y="18" font-size="11" font-weight="bold" fill="#92400e">💡 Aturan Poin</text>
    <text x="10" y="36" font-size="10" fill="#78350f">Earn: Rp1.000 = 1 poin</text>
    <text x="10" y="52" font-size="10" fill="#78350f">Redeem Small  = 200 poin</text>
    <text x="10" y="68" font-size="10" fill="#78350f">Redeem Medium = 300 poin</text>
    <text x="10" y="84" font-size="10" fill="#78350f">Redeem Large  = 500 poin</text>
  </g>

  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>
</svg>
